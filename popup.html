<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>UKG CSV Filler</title>
  <style>
    body { font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif; width: 360px; padding: 12px; margin: 0; }
    h1 { font-size: 14px; margin: 0 0 8px; color: #005151; }
    p.help { font-size: 12px; color: #555; margin: 0 0 10px; }
    .row { margin-bottom: 10px; }
    button { background: #005151; color: white; border: 0; padding: 8px 14px; border-radius: 3px; cursor: pointer; font-size: 13px; }
    button:disabled { background: #999; cursor: not-allowed; }
    button.secondary { background: #eee; color: #333; }
    input[type=file] { font-size: 12px; }
    #log { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; background: #f6f6f6; border: 1px solid #ddd; padding: 6px; border-radius: 3px; max-height: 220px; overflow-y: auto; white-space: pre-wrap; }
    .ok { color: #1B7F66; }
    .warn { color: #D17600; }
    .err { color: #DC0C22; }
    .muted { color: #888; }
    label { font-size: 12px; display: block; margin-bottom: 4px; }
    .footer { font-size: 11px; color: #888; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>UKG Timesheet CSV Filler</h1>
  <p class="help">
    Loads a CSV with columns <code>date,time_code,start,end</code> and fills the open
    UKG timesheet. <strong>Only fills</strong> — never clicks Save or Submit. Skips any day
    that already has entries.
  </p>

  <div class="row">
    <label for="csv">CSV file</label>
    <input id="csv" type="file" accept=".csv,text/csv">
  </div>

  <div class="row">
    <button id="fill" disabled>Fill timesheet</button>
    <button id="clearLog" class="secondary">Clear log</button>
  </div>

  <div class="row">
    <div id="log" class="muted">No CSV loaded.</div>
  </div>

  <div class="footer">
    Open the timesheet page first, then click Fill. Re-run for each pay period.
  </div>

  <script src="popup.js"></script>
</body>
</html>
